<title>Mercado de Paladear Sabores — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#4a7c8e;
  --azul-dark:#2d5a6b;
  --azul-light:#d6e8ee;
  --azul-mid:#6a9aaa;
  --blanco:#ffffff;
  --crema:#f8f9fa;
  --gris:#666;
  --gris-light:#e8edf0;
  --texto:#1a2f38;
  --sombra:0 2px 12px rgba(74,124,142,0.12);
  --sombra-hover:0 6px 24px rgba(74,124,142,0.22);
}
body{font-family:'DM Sans',sans-serif;background:#f0f4f6;color:var(--texto);min-height:100vh}

/* HEADER */
.hdr{background:var(--azul);position:sticky;top:0;z-index:300;box-shadow:0 2px 16px rgba(45,90,107,0.35)}
.hdr-i{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 20px;gap:14px}

/* LOGO SVG */
.logo-wrap{display:flex;align-items:center;gap:0;flex-shrink:0;cursor:default}
.logo-svg{width:62px;height:62px}

.hdr-inf{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;flex:1}
.bdg{background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid rgba(255,255,255,.22);white-space:nowrap}
.bdg.g{background:#fff;color:var(--azul-dark);border-color:transparent;font-weight:700}

.cart-b{background:#fff;color:var(--azul-dark);border:none;padding:8px 16px;border-radius:24px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;flex-shrink:0}
.cart-b:hover{background:var(--azul-light);transform:scale(1.03)}
.cnt{background:#e05a2b;color:#fff;border-radius:50%;width:20px;height:20px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

.may-bar{background:var(--azul-dark);text-align:center;padding:6px 20px;font-size:11px;font-weight:500;color:rgba(255,255,255,.9)}
.may-bar span{font-weight:700;color:#fff}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:20px}

.srch-w{position:relative;margin-bottom:22px}
.srch{width:100%;background:#fff;border:2px solid var(--gris-light);border-radius:28px;padding:10px 44px 10px 18px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--texto);outline:none;transition:border-color .2s;box-shadow:var(--sombra)}
.srch:focus{border-color:var(--azul)}
.srch-ic{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--gris);font-size:17px;pointer-events:none}

.sec-t{font-family:'Playfair Display',serif;font-size:21px;color:var(--azul-dark);margin-bottom:14px;font-weight:700}

/* CATEGORÍAS */
.cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px;margin-bottom:28px}
.cc{background:#fff;border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .18s;border:2px solid transparent;box-shadow:var(--sombra)}
.cc:hover{border-color:var(--azul-mid);transform:translateY(-2px)}
.cc.act{border-color:var(--azul);background:var(--azul-light)}
.cc-ic{font-size:22px;margin-bottom:5px;display:block}
.cc-nm{font-size:11px;font-weight:600;color:var(--azul-dark);line-height:1.2}

/* SECCIÓN */
.sec-blk{margin-bottom:32px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.vm-b{background:none;border:1.5px solid var(--azul);color:var(--azul);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:5px 13px;border-radius:18px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:4px}
.vm-b:hover{background:var(--azul);color:#fff}
.vm-b .ar{transition:transform .3s}
.vm-b.op .ar{transform:rotate(180deg)}

/* GRID PRODUCTOS */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:14px}
.pe{display:none;margin-top:14px}
.pe.vis{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:14px}

/* TARJETA */
.pc{background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--sombra);transition:all .2s;display:flex;flex-direction:column;border:1.5px solid transparent}
.pc:hover{transform:translateY(-3px);box-shadow:var(--sombra-hover);border-color:var(--azul-light)}
.p-img-w{width:100%;height:136px;background:#f4f8fa;display:flex;align-items:center;justify-content:center;overflow:hidden}
.p-img{width:100%;height:100%;object-fit:cover}
.p-img.contain{object-fit:contain;padding:6px}
.pb{padding:11px;flex:1;display:flex;flex-direction:column}
.pn{font-weight:600;font-size:12px;color:var(--texto);margin-bottom:2px;line-height:1.35}
.pm{font-size:10px;color:var(--gris);margin-bottom:8px}

.opts{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}
.opt{background:#f0f4f6;border:1.5px solid transparent;border-radius:7px;padding:3px 7px;font-size:10px;font-weight:600;color:var(--azul-dark);cursor:pointer;transition:all .13s}
.opt:hover{border-color:var(--azul-mid)}
.opt.sel{background:var(--azul);color:#fff;border-color:var(--azul)}

.pr-row{display:flex;gap:7px;align-items:flex-end;margin-bottom:9px;flex-wrap:wrap}
.pr-blk{display:flex;flex-direction:column}
.pr-l{font-size:9px;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.pr-min{font-size:13px;font-weight:700;color:var(--texto)}
.pr-may{font-size:11px;font-weight:700;color:var(--azul-dark);background:var(--azul-light);padding:2px 7px;border-radius:8px;display:inline-block}

.qc{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.qb{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--azul);background:none;color:var(--azul);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .13s;line-height:1}
.qb:hover{background:var(--azul);color:#fff}
.qd{font-size:14px;font-weight:700;min-width:22px;text-align:center;color:var(--texto)}

.ab{background:var(--azul);color:#fff;border:none;border-radius:9px;padding:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px;width:100%;margin-top:auto}
.ab:hover{background:var(--azul-dark)}
.ab:active{transform:scale(.97)}
.ab.done{background:#2d7a4a}

/* CARRITO */
.ov{display:none;position:fixed;inset:0;background:rgba(26,47,56,.5);z-index:500}
.ov.op{display:block}
.cp{position:fixed;right:0;top:0;bottom:0;width:370px;max-width:95vw;background:#fff;z-index:501;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;box-shadow:-4px 0 28px rgba(45,90,107,.18)}
.cp.op{transform:translateX(0)}
.ch{background:var(--azul);color:#fff;padding:15px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ch h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.cx{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s}
.cx:hover{background:rgba(255,255,255,.35)}
.cil{flex:1;overflow-y:auto;padding:14px}
.ci{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid #edf1f3}
.ci-n{flex:1;font-size:12px;font-weight:600;color:var(--texto);line-height:1.3}
.ci-sm{font-size:10px;color:var(--gris);font-weight:400;display:block}
.ci-q{display:flex;align-items:center;gap:4px}
.ci-q button{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--azul);background:none;color:var(--azul);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.ci-q button:hover{background:var(--azul);color:#fff}
.ci-q span{font-size:13px;font-weight:700;min-width:18px;text-align:center}
.ci-p{font-size:12px;font-weight:700;color:var(--texto);min-width:68px;text-align:right;white-space:nowrap}
.di{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 4px;transition:color .13s}
.di:hover{color:#e05a2b}
.cft{padding:14px;border-top:2px solid #edf1f3;flex-shrink:0}
.ms{background:var(--azul-light);border-radius:10px;padding:9px 13px;margin-bottom:11px;font-size:11px;color:var(--azul-dark);font-weight:500;text-align:center;border:1px solid rgba(74,124,142,.2)}
.ms.act{background:var(--azul);color:#fff;border-color:transparent}
.ms .ds{font-size:16px;font-weight:700;display:block;margin-top:2px}
.tot{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.tr{display:flex;justify-content:space-between;font-size:12px;color:var(--gris)}
.tr.m{font-size:15px;font-weight:700;color:var(--texto);border-top:1.5px solid #edf1f3;padding-top:7px;margin-top:3px}
.tr.dc{color:var(--azul-dark);font-weight:600;font-size:12px}
.wb{background:#25d366;color:#fff;border:none;border-radius:11px;padding:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s}
.wb:hover{background:#1ebe5d;transform:scale(1.02)}
.ec{text-align:center;padding:40px 16px;color:var(--gris)}
.ec-ic{font-size:44px;margin-bottom:10px;display:block;opacity:.3}
.no-r{text-align:center;padding:48px;color:var(--gris);font-size:14px}

@media(max-width:640px){
  .pg,.pe.vis{grid-template-columns:repeat(2,1fr);gap:8px}
  .cats{grid-template-columns:repeat(4,1fr);gap:6px}
  .hdr-inf{display:none}
  .cp{width:100%;max-width:100vw}
  .logo-svg{width:50px;height:50px}
}
</style>
</head>

// STATE
let cart=[];let catAct='todos';let exp={};let opts={};let cants={};
PRODS.forEach(p=>{opts[p[0]]=Object.keys(p[7])[0];cants[p[0]]=1;});

function renderCats(){
  const el=document.getElementById('cg');
  let h=`<div class="cc ${catAct==='todos'?'act':''}" onclick="setCat('todos')"><span class="cc-ic">🏪</span><div class="cc-nm">Todos</div></div>`;
  CATS.forEach(c=>{h+=`<div class="cc ${catAct===c.id?'act':''}" onclick="setCat('${c.id}')"><span class="cc-ic">${c.ic}</span><div class="cc-nm">${c.n}</div></div>`;});
  el.innerHTML=h;
}
function setCat(id){catAct=id;document.getElementById('si').value='';renderCats();renderProds();}

function getImg(key){
  const e=IMGS[key]||'🌿';
  return `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,#f4f8fa 0%,#e8eff3 100%)">${e}</div>`;
}

function card(p){
  const opcs=Object.keys(p[7]);
  const opc=opts[p[0]]||opcs[0];
  const pl=p[7][opc];
  const c=cants[p[0]]||1;
  const oph=opcs.map(o=>`<div class="opt ${opc===o?'sel':''}" onclick="setOpt(${p[0]},'${o}')">${o}</div>`).join('');
  return `<div class="pc" id="c${p[0]}">
    <div class="p-img-w">${getImg(p[6])}</div>
    <div class="pb">
      <div class="pn">${p[2]}</div>
      <div class="pm">${p[3]}</div>
      <div class="opts">${oph}</div>
      <div class="pr-row">
        <div class="pr-blk"><span class="pr-l">Lista 1</span><span class="pr-min">$${pl[0].toLocaleString('es-AR')}</span></div>
        <div class="pr-blk"><span class="pr-l">Lista 2</span><span class="pr-may">$${pl[1].toLocaleString('es-AR')}</span></div>
      </div>
      <div class="qc">
        <button class="qb" onclick="chgQ(${p[0]},-1)">−</button>
        <span class="qd" id="q${p[0]}">${c}</span>
        <button class="qb" onclick="chgQ(${p[0]},1)">+</button>
      </div>
      <button class="ab" id="ab${p[0]}" onclick="addCart(${p[0]})">🛒 Agregar al pedido</button>
    </div>
  </div>`;
}

function renderProds(bus=''){
  const cont=document.getElementById('pc');
  let h='';
  const cats=catAct==='todos'?CATS:CATS.filter(c=>c.id===catAct);
  cats.forEach(cat=>{
    let ps=PRODS.filter(p=>p[1]===cat.id);
    if(bus)ps=ps.filter(p=>p[2].toLowerCase().includes(bus.toLowerCase())||p[3].toLowerCase().includes(bus.toLowerCase()));
    if(!ps.length)return;
    const dest=ps.filter(p=>p[5]);
    const extra=ps.filter(p=>!p[5]);
    const show=bus?ps:dest;
    const showEx=bus?[]:extra;
    h+=`<div class="sec-blk"><div class="sh"><div class="sec-t">${cat.ic} ${cat.n}</div>`;
    if(showEx.length)h+=`<button class="vm-b ${exp[cat.id]?'op':''}" onclick="togEx('${cat.id}',this)">Ver más <span class="ar">▾</span></button>`;
    h+=`</div><div class="pg">`;
    show.forEach(p=>{h+=card(p);});
    h+=`</div>`;
    if(showEx.length){
      h+=`<div class="pe ${exp[cat.id]?'vis':''}">`;
      showEx.forEach(p=>{h+=card(p);});
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  cont.innerHTML=h||`<div class="no-r">No se encontraron productos 🔍</div>`;
}

function setOpt(pid,o){opts[pid]=o;renderProds(document.getElementById('si').value);}
function chgQ(pid,d){
  cants[pid]=Math.max(1,(cants[pid]||1)+d);
  const el=document.getElementById('q'+pid);
  if(el)el.textContent=cants[pid];
}
function togEx(cid){exp[cid]=!exp[cid];renderProds(document.getElementById('si').value);}
function filtrar(v){catAct='todos';renderCats();renderProds(v);}

function addCart(pid){
  const p=PRODS.find(x=>x[0]===pid);
  const o=opts[pid];const c=cants[pid]||1;
  const key=`${pid}-${o}`;
  const ex=cart.find(i=>i.key===key);
  if(ex){ex.c+=c;}else{cart.push({key,pid,n:p[2],o,c,l1:p[7][o][0],l2:p[7][o][1]});}
  renderCart();
  const btn=document.getElementById('ab'+pid);
  if(btn){btn.textContent='✓ Agregado!';btn.classList.add('done');setTimeout(()=>{btn.innerHTML='🛒 Agregar al pedido';btn.classList.remove('done');},1400);}
}

function delItem(key){cart=cart.filter(i=>i.key!==key);renderCart();}
function chgCartQ(key,d){
  const it=cart.find(i=>i.key===key);
  if(it){it.c=Math.max(1,it.c+d);}
  renderCart();
}

function renderCart(){
  const cnt=cart.reduce((a,i)=>a+i.c,0);
  document.getElementById('cc').textContent=cnt;
  const list=document.getElementById('cil');
  const ft=document.getElementById('cft');
  if(!cart.length){
    list.innerHTML=`<div class="ec"><span class="ec-ic">🛒</span><div style="font-size:14px;font-weight:600;color:#1a2f38;margin-bottom:5px">Tu carrito está vacío</div><div style="font-size:12px;color:#666">Agregá productos para armar tu pedido</div></div>`;
    ft.innerHTML='';return;
  }
  let tMin=0,tMay=0,ih='';
  cart.forEach(it=>{
    const sMin=it.l1*it.c,sMay=it.l2*it.c;
    tMin+=sMin;tMay+=sMay;
    ih+=`<div class="ci">
      <div class="ci-n">${it.n}<span class="ci-sm">${it.o}</span></div>
      <div class="ci-q"><button onclick="chgCartQ('${it.key}',-1)">−</button><span>${it.c}</span><button onclick="chgCartQ('${it.key}',1)">+</button></div>
      <div class="ci-p">$${sMin.toLocaleString('es-AR')}</div>
      <button class="di" onclick="delItem('${it.key}')">×</button>
    </div>`;
  });
  list.innerHTML=ih;
  const esMay=tMin>=80000;
  const aho=tMin-tMay;const tf=esMay?tMay:tMin;
  const falta=80000-tMin;
  ft.innerHTML=`${esMay
    ?`<div class="ms act">✅ ¡Precio Mayorista (Lista 2) activado!<span class="ds">Ahorrás $${aho.toLocaleString('es-AR')}</span></div>`
    :`<div class="ms">🏷️ Agregá $${Math.max(0,falta).toLocaleString('es-AR')} más para precio Lista 2</div>`}
  <div class="tot">
    <div class="tr"><span>Subtotal Lista 1</span><span>$${tMin.toLocaleString('es-AR')}</span></div>
    ${esMay?`<div class="tr dc"><span>Descuento mayorista</span><span>−$${aho.toLocaleString('es-AR')}</span></div>`:''}
    <div class="tr m"><span>Total a pagar</span><span>$${tf.toLocaleString('es-AR')}</span></div>
  </div>
  <button class="wb" onclick="pedirWA()">💬 Pedir por WhatsApp</button>`;
}

function toggleCart(){
  document.getElementById('cp').classList.toggle('op');
  document.getElementById('ov').classList.toggle('op');
}

function pedirWA(){
  let msg='🛒 *Pedido - Mercado de Paladear Sabores*\n\n';
  let tot=0;
  const esMay=cart.reduce((a,i)=>a+i.l1*i.c,0)>=80000;
  cart.forEach(it=>{
    const p=esMay?it.l2:it.l1;const s=p*it.c;tot+=s;
    msg+=`• ${it.n} (${it.o}) x${it.c} — $${s.toLocaleString('es-AR')}\n`;
  });
  msg+=`\n*TOTAL: $${tot.toLocaleString('es-AR')}*`;
  if(esMay)msg+='\n_(Lista 2 · Precio Mayorista aplicado)_';
  msg+='\n\n_Pedido realizado desde el catálogo online_';
  window.open(`https://wa.me/5492616512823?text=${encodeURIComponent(msg)}`,'_blank');
}
